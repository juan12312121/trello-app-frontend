<section id="features" class="features-section">
  <div class="section-header">
    <h2>Características Potentes</h2>
    <p>Todo lo que necesitas para gestionar proyectos como un profesional</p>
  </div>

  <div class="features-grid">
    @for (feat of features; track feat.title) {
      <div class="feat-card">
        <div class="icon-wrap">
          <span class="material-icons">{{ feat.icon }}</span>
        </div>
        <h3>{{ feat.title }}</h3>
        <p>{{ feat.description }}</p>
      </div>
    }
  </div>
</section>
