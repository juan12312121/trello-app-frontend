<div class="overlay" (click)="closed.emit()">
  <div class="modal-sm" (click)="$event.stopPropagation()">

    <div class="modal-hdr">
      <span class="modal-title">Nueva tarjeta</span>
      <button class="modal-x" (click)="closed.emit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="modal-body">

      <!-- Título -->
      <div class="form-group">
        <label class="form-lbl">
          Título <span class="req">*</span>
        </label>
        <input
          class="form-input"
          placeholder="¿Qué hay que hacer?"
          [value]="titulo()"
          (input)="titulo.set($any($event.target).value)"
          autofocus>
      </div>

      <!-- Descripción -->
      <div class="form-group">
        <label class="form-lbl">Descripción</label>
        <textarea
          class="form-textarea"
          placeholder="Más detalles…"
          [value]="descripcion()"
          (input)="descripcion.set($any($event.target).value)">
        </textarea>
      </div>

      <!-- Prioridad + Vencimiento -->
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-lbl">Prioridad</label>
          <select class="form-select"
            [value]="prioridad()"
            (change)="prioridad.set($any($event.target).value)">
            <option value="media">Media</option>
            <option value="alta">Alta</option>
            <option value="baja">Baja</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-lbl">Vencimiento</label>
          <input
            class="form-input"
            type="date"
            [value]="due()"
            (input)="due.set($any($event.target).value)">
        </div>
      </div>

      <!-- Asignar -->
      <div class="form-group" style="margin-top:14px">
        <label class="form-lbl">Asignar a</label>
        <select class="form-select"
          [value]="assignedId() ?? ''"
          (change)="assignedId.set($any($event.target).value ? +$any($event.target).value : null)">
          <option value="">Sin asignar</option>
          @for (m of members(); track m.id) {
            <option [value]="m.id">{{ m.nombre }}</option>
          }
        </select>
      </div>

      <!-- Lista destino -->
      <div class="form-group">
        <label class="form-lbl">Lista destino</label>
        <select class="form-select"
          [value]="listId() ?? ''"
          (change)="listId.set(+$any($event.target).value)">
          @for (l of lists(); track l.id) {
            <option [value]="l.id">{{ l.nombre }}</option>
          }
        </select>
      </div>

      <!-- Etiquetas -->
      <div class="form-group">
        <label class="form-lbl">Etiquetas</label>
        <div class="tag-sel-row">
          @for (tag of tags(); track tag.id) {
            <span
              class="tag-sel-chip"
              [class.on]="isTagSelected(tag.id)"
              [style.background]="tag.color + '20'"
              [style.color]="tag.color"
              [style.border-color]="isTagSelected(tag.id) ? tag.color : 'transparent'"
              (click)="toggleTag(tag.id)">
              <span class="tag-dot" [style.background]="tag.color"></span>
              {{ tag.nombre }}
            </span>
          }
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-full ghost" (click)="closed.emit()">Cancelar</button>
        <button class="btn-full primary" (click)="confirm()">Crear tarjeta</button>
      </div>

    </div>
  </div>
</div>
